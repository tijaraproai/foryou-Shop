<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أضف منتج - ForYou</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>أضف منتجك</header>

<form id="productForm">
  <input type="text" id="title" placeholder="اسم المنتج" required>
  <input type="number" id="price" placeholder="السعر $" required>
  <textarea id="description" placeholder="وصف المنتج"></textarea>
  <label>اختر المنطقة:</label>
  <select id="region" required>
    <option value="شمال">شمال</option>
    <option value="جنوب">جنوب</option>
    <option value="شرق">شرق</option>
    <option value="غرب">غرب</option>
  </select>
  <label>اختر المقاطعة:</label>
  <select id="district" required>
    <option value="أ">أ</option>
    <option value="ب">ب</option>
    <option value="ج">ج</option>
    <option value="د">د</option>
  </select>
  <label>رفع صور المنتج:</label>
  <input type="file" id="images" multiple accept="image/*">
  <button type="submit">رفع المنتج</button>
</form>

<script src="js/script.js"></script>
</body>
</html>
