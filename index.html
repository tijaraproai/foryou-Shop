<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForYou Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; font-family:'Almarai',sans-serif; margin:0; padding:0; }
  body { background:#f4f4f4; color:#333; }
  header { background:#00bfa5; color:white; padding:20px; text-align:center; }
  header h1 { font-size:2rem; }
  main { padding:20px; max-width:1200px; margin:0 auto; }
  .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }
  .product { background:white; border-radius:12px; box-shadow:0 4px 8px rgba(0,0,0,0.1); padding:15px; transition: transform 0.2s; min-height:250px; display:flex; flex-direction:column; justify-content:center; align-items:center; }
  .product:hover { transform: translateY(-5px); }
  .product img { width:100%; border-radius:8px; margin-bottom:10px; display:none; }
  .product h3, .product p, .product button { display:none; }
  footer { text-align:center; padding:20px; margin-top:40px; color:#777; }
  @media (max-width:600px) { .products { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
  <h1>ForYou Shop 🚀</h1>
  <p>النسخة الأساسية لمتجر البائعين</p>
</header>

<main>
  <div class="products" id="products-container">
    <!-- سيتم إضافة المنتجات من لوحة التحكم لاحقًا -->
  </div>
</main>

<footer>
  &copy; 2026 ForYou Shop
</footer>

</script>

</body>
</html>
